[build]
  command = "npm run build"
  publish = "dist"

# SPA routing — send all non-asset routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Security Headers (all routes) ───
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://smartgateway.hdfc.bank.in https://smartgateway.hdfcuat.bank.in; img-src 'self' data: blob: https:; frame-src 'none'"

# ─── Immutable cache for hashed assets ───
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ─── No cache for index.html (always fetch latest) ───
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
